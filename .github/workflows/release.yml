name: Release

# Builds native installers on each platform's own runner and attaches them to a
# GitHub Release. Triggered by pushing a version tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}   # also runnable by hand from the Actions tab

permissions:
  contents: write          # needed to create/update the Release

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows (.msi)
            task: packageMsi
            artifact: shared/build/compose/binaries/main/msi/*.msi
          - os: macos-latest
            label: macOS (.dmg)
            task: packageDmg
            artifact: shared/build/compose/binaries/main/dmg/*.dmg
          - os: ubuntu-latest
            label: Linux (.deb)
            task: packageDeb
            artifact: shared/build/compose/binaries/main/deb/*.deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Linux packaging tools
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y fakeroot binutils

      - name: Build installer
        shell: bash
        run: |
          chmod +x ./gradlew || true
          ./gradlew :shared:${{ matrix.task }} --no-daemon --stacktrace

      - name: Attach installer to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}

      # When run manually (no tag), keep the installer as a downloadable build artifact instead.
      - name: Upload build artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: NodeNote-${{ matrix.os }}
          path: ${{ matrix.artifact }}
